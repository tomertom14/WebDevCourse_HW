<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
</head>
<nav style="text-align: center; margin: 20px; font-family: Arial, sans-serif;">
    <a href="playlist.html" style="margin: 0 10px;">Playlist</a> | 
    <a href="contact.html" style="margin: 0 10px;">Contact</a> | 
    <a href="audioList.html" style="margin: 0 10px;">Audio List</a> | 
    <a href="summary.html" style="margin: 0 10px;">Summary</a>
</nav>
<hr>
<body>
    <h1 style="text-align: center;">Contact</h1>
    
    <table id="contact-table">
        <thead>
            <tr>
                <th colspan="2">Send a Message</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Name:</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Phone:</td>
                <td><input type="tel"></td>
            </tr>
            <tr>
                <td>Subject:</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Message:</td>
                <td><textarea rows="4" cols="20"></textarea></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button type="button" id="send-btn">Send Message</button>
                </td>
            </tr>
        </tbody>
    </table>
</body>
<script src="contact.js" defer></script>
</html>
